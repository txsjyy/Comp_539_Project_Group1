# app.yaml

runtime: java17
entrypoint: java -jar target/snaplink-1.0.0.jar
service: snaplink

# Set this to the service account for your own GCP project before deploying.
service_account: your-service-account@your-gcp-project.iam.gserviceaccount.com

# Configure these in App Engine or Secret Manager for production deployments.
env_variables:
  GCP_PROJECT_ID: your-gcp-project-id
  GCP_BIGTABLE_INSTANCE_ID: your-bigtable-instance-id
  POSTMARK_SERVER_TOKEN: your-postmark-server-token
  POSTMARK_SIGNUP_TEMPLATE_ID: "0"
  POSTMARK_RESET_PASSWORD_TEMPLATE_ID: "0"


